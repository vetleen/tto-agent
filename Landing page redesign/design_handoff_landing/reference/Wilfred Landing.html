<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wilfred — An AI colleague for technology transfer</title>
<link rel="icon" type="image/svg+xml" href="assets/wilfred-mark.svg">
<link rel="stylesheet" href="_ds/wilfred-design-system-89473773-5d25-4f30-a37c-53158dbd0cd8/styles.css">
<style>
  html, body { margin: 0; background: var(--surface-page); }
  #app { min-height: 100vh; }

  /* ============================== Layout shell ============================== */
  .ld-wrap { --edge: clamp(20px, 6vw, 88px); }
  .ld-container { max-width: 1240px; margin: 0 auto; padding-inline: var(--edge); }
  .ld-section { padding-block: clamp(72px, 9vw, 132px); }

  /* ============================== Top nav ============================== */
  .ld-nav {
    position: sticky; top: 0; z-index: 60;
    background: color-mix(in srgb, var(--paper-50) 86%, transparent);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--border-subtle);
  }
  .ld-nav__inner { display: flex; align-items: center; gap: 28px; height: 68px; }
  .ld-brand { display: flex; align-items: center; gap: 11px; text-decoration: none; }
  .ld-brand img { width: 30px; height: 30px; }
  .ld-brand b { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--text-heading); letter-spacing: -0.02em; }
  .ld-nav__links { display: flex; align-items: center; gap: 30px; margin-left: 14px; }
  .ld-nav__links a { font-size: 14.5px; font-weight: 500; color: var(--text-muted); }
  .ld-nav__links a:hover { color: var(--text-heading); text-decoration: none; }
  .ld-nav__cta { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .ld-nav__login { font-size: 14.5px; font-weight: 600; color: var(--text-heading); cursor: pointer; white-space: nowrap; }
  .ld-nav__login:hover { color: var(--accent-active); text-decoration: none; }
  @media (max-width: 720px) { .ld-nav__links { display: none; } }

  /* ============================== Hero ============================== */
  .ld-hero { position: relative; isolation: isolate; background: var(--forest-950); overflow: hidden; }
  .ld-hero__bg { position: absolute; inset: 0; z-index: -2; }
  .ld-hero__bg img { width: 100%; height: 100%; object-fit: cover; object-position: 60% 50%; filter: saturate(0.82) brightness(0.74); }
  .ld-hero__scrim { position: absolute; inset: 0; z-index: -1;
    background:
      linear-gradient(90deg, rgba(6,21,14,0.94) 0%, rgba(6,21,14,0.82) 38%, rgba(6,21,14,0.36) 72%, rgba(6,21,14,0.18) 100%),
      linear-gradient(0deg, rgba(6,21,14,0.85) 0%, rgba(6,21,14,0) 46%),
      radial-gradient(70% 60% at 84% 8%, rgba(190,130,66,0.20), transparent 60%);
  }
  .ld-hero__inner { padding-block: clamp(96px, 14vw, 184px); max-width: 760px; }
  .ld-eyebrow { display: inline-flex; align-items: center; gap: 10px; font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; }
  .ld-eyebrow--onfilm { color: var(--copper-300); }
  .ld-eyebrow--onfilm::before { content: ""; width: 26px; height: 1px; background: var(--copper-400); opacity: 0.8; }
  .ld-hero h1 {
    font-family: var(--font-serif); color: #F4F7F4; font-weight: 600;
    font-size: clamp(44px, 6.2vw, 82px); line-height: 1.02; letter-spacing: -0.028em;
    margin-top: 22px; text-wrap: balance;
  }
  .ld-hero h1 em { font-style: italic; color: var(--copper-300); }
  .ld-hero__lede { font-size: clamp(17px, 1.5vw, 21px); line-height: 1.6; color: rgba(231,239,233,0.82); margin-top: 26px; max-width: 580px; }
  .ld-hero__cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 38px; }
  .ld-hero__meta { display: flex; flex-wrap: wrap; align-items: center; gap: 10px 22px; margin-top: 52px; font-family: var(--font-mono); font-size: 12.5px; color: rgba(231,239,233,0.6); }
  .ld-hero__meta span { display: inline-flex; align-items: center; gap: 8px; }
  .ld-hero__meta svg { width: 15px; height: 15px; color: var(--copper-400); }
  .ld-hero__meta .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(231,239,233,0.35); }

  /* ============================== Trust strip ============================== */
  .ld-trust { border-bottom: 1px solid var(--border-subtle); background: var(--paper-0); }
  .ld-trust__inner { padding-block: 34px; display: flex; align-items: center; gap: clamp(24px, 5vw, 64px); flex-wrap: wrap; }
  .ld-trust__label { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-faint); max-width: 150px; line-height: 1.5; }
  .ld-trust__names { display: flex; align-items: center; gap: clamp(22px, 4vw, 52px); flex-wrap: wrap; }
  .ld-trust__names span { font-family: var(--font-serif); font-size: clamp(16px, 1.6vw, 20px); font-weight: 600; color: var(--slate-500); letter-spacing: -0.01em; white-space: nowrap; }

  /* ============================== Positioning statement ============================== */
  .ld-statement { background: var(--surface-page); }
  .ld-statement__grid { display: grid; grid-template-columns: 0.8fr 1.4fr; gap: clamp(28px, 5vw, 72px); align-items: start; }
  .ld-statement h2 { font-family: var(--font-serif); font-size: clamp(28px, 3.4vw, 44px); line-height: 1.12; letter-spacing: -0.022em; color: var(--text-heading); text-wrap: balance; }
  .ld-statement h2 .muted { color: var(--paper-400); }
  .ld-statement__col p { font-size: clamp(16px, 1.4vw, 18.5px); line-height: 1.65; color: var(--text-body); }
  .ld-statement__col p + p { margin-top: 20px; }
  @media (max-width: 860px) { .ld-statement__grid { grid-template-columns: 1fr; gap: 28px; } }

  /* section eyebrow on paper */
  .ld-seceye { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-accent); display: inline-flex; align-items: center; gap: 10px; }
  .ld-seceye::before { content: ""; width: 26px; height: 1px; background: var(--border-accent); }

  /* ============================== Capabilities ============================== */
  .ld-caps { background: var(--paper-0); border-block: 1px solid var(--border-subtle); }
  .ld-caps__head { max-width: 620px; margin-bottom: clamp(40px, 5vw, 64px); }
  .ld-caps__head h2 { font-size: clamp(30px, 3.6vw, 46px); line-height: 1.08; letter-spacing: -0.024em; margin-top: 18px; text-wrap: balance; }
  .ld-caps__head p { font-size: 18px; line-height: 1.6; color: var(--text-muted); margin-top: 18px; }

  .ld-feature { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(32px, 5vw, 80px); align-items: center; }
  .ld-feature + .ld-feature { margin-top: clamp(56px, 7vw, 104px); }
  .ld-feature--flip .ld-feature__media { order: -1; }
  .ld-feature__media { position: relative; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-subtle); box-shadow: var(--shadow-md); aspect-ratio: 16 / 11; background: var(--forest-900); }
  .ld-feature__media img { width: 100%; height: 100%; object-fit: cover; }
  .ld-feature__media--tint img { filter: saturate(0.88); }
  .ld-feature__tag { position: absolute; left: 16px; bottom: 16px; display: inline-flex; align-items: center; gap: 8px; padding: 7px 13px; border-radius: var(--radius-pill); background: rgba(6,21,14,0.66); backdrop-filter: blur(6px); border: 1px solid rgba(255,255,255,0.14); color: #EFF5F1; font-family: var(--font-mono); font-size: 12px; }
  .ld-feature__tag svg { width: 14px; height: 14px; color: var(--copper-300); }
  .ld-feature__eyebrow { font-family: var(--font-sans); font-size: 12px; font-weight: 600; letter-spacing: var(--tracking-caps); text-transform: uppercase; color: var(--text-accent); }
  .ld-feature__body h3 { font-size: clamp(24px, 2.6vw, 33px); line-height: 1.12; letter-spacing: -0.02em; margin-top: 14px; }
  .ld-feature__body > p { font-size: 17px; line-height: 1.62; color: var(--text-body); margin-top: 16px; max-width: 480px; }
  .ld-feature__list { list-style: none; padding: 0; margin: 26px 0 0; display: flex; flex-direction: column; gap: 14px; }
  .ld-feature__list li { display: flex; gap: 12px; align-items: flex-start; font-size: 15px; line-height: 1.5; color: var(--text-body); }
  .ld-feature__list svg { width: 18px; height: 18px; color: var(--forest-500); flex-shrink: 0; margin-top: 2px; }
  @media (max-width: 860px) {
    .ld-feature { grid-template-columns: 1fr; gap: 28px; }
    .ld-feature--flip .ld-feature__media { order: 0; }
  }

  /* product mock */
  .ld-mock { background: var(--forest-900); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--forest-700); box-shadow: var(--shadow-lg); display: flex; flex-direction: column; height: 100%; }
  .ld-mock__bar { display: flex; align-items: center; gap: 8px; padding: 13px 16px; border-bottom: 1px solid var(--border-inverse); }
  .ld-mock__dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.18); }
  .ld-mock__title { margin-left: 10px; font-family: var(--font-mono); font-size: 12px; color: rgba(239,245,241,0.5); }
  .ld-mock__body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .ld-msg { display: flex; gap: 12px; align-items: flex-start; }
  .ld-msg__av { width: 30px; height: 30px; border-radius: var(--radius-md); flex-shrink: 0; display: grid; place-items: center; font-family: var(--font-serif); font-weight: 600; font-size: 13px; }
  .ld-msg__av--u { background: var(--forest-700); color: #EFF5F1; }
  .ld-msg__av--w { background: var(--copper-500); color: #1A1206; }
  .ld-msg__bubble { font-size: 14px; line-height: 1.55; }
  .ld-msg--u .ld-msg__bubble { color: rgba(239,245,241,0.92); }
  .ld-msg--w .ld-msg__bubble { color: rgba(239,245,241,0.78); }
  .ld-msg__cite { display: inline-flex; align-items: center; gap: 6px; margin-top: 9px; padding: 4px 10px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.06); border: 1px solid var(--border-inverse); font-family: var(--font-mono); font-size: 11px; color: var(--copper-300); }
  .ld-msg__cite svg { width: 12px; height: 12px; }
  .ld-mock__rooms { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
  .ld-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: var(--radius-pill); border: 1px solid var(--border-inverse); font-family: var(--font-mono); font-size: 11.5px; color: rgba(239,245,241,0.7); }
  .ld-chip svg { width: 12px; height: 12px; color: var(--copper-300); }
  .ld-mock__caret { width: 8px; height: 16px; background: var(--copper-400); border-radius: 1px; display: inline-block; vertical-align: text-bottom; margin-left: 2px; animation: ld-blink 1.1s steps(1) infinite; }
  @keyframes ld-blink { 50% { opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .ld-mock__caret { animation: none; } }

  /* ============================== Security band ============================== */
  .ld-secure { position: relative; background: var(--forest-950); color: #EFF5F1; overflow: hidden; isolation: isolate; }
  .ld-secure::after { content: ""; position: absolute; inset: 0; z-index: -1; background: radial-gradient(60% 70% at 12% 0%, rgba(190,130,66,0.14), transparent 60%); }
  .ld-secure__top { display: grid; grid-template-columns: auto 1fr; gap: clamp(24px, 4vw, 48px); align-items: center; }
  .ld-secure__seal { width: 88px; height: 88px; }
  .ld-secure h2 { color: #F4F7F4; font-size: clamp(28px, 3.4vw, 44px); line-height: 1.1; letter-spacing: -0.022em; text-wrap: balance; max-width: 720px; }
  .ld-secure__eye { color: var(--copper-300); }
  .ld-secure__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; margin-top: clamp(48px, 6vw, 72px); background: var(--border-inverse); border: 1px solid var(--border-inverse); border-radius: var(--radius-lg); overflow: hidden; }
  .ld-secure__cell { background: var(--forest-950); padding: 30px 28px; }
  .ld-secure__cell svg { width: 22px; height: 22px; color: var(--copper-400); }
  .ld-secure__cell h4 { font-family: var(--font-serif); font-size: 19px; font-weight: 600; color: #F4F7F4; margin-top: 16px; letter-spacing: -0.01em; }
  .ld-secure__cell p { font-size: 14.5px; line-height: 1.58; color: rgba(231,239,233,0.66); margin-top: 8px; }
  @media (max-width: 860px) { .ld-secure__grid { grid-template-columns: 1fr; } .ld-secure__top { grid-template-columns: 1fr; } }

  /* ============================== Testimonial ============================== */
  .ld-quote { background: var(--paper-0); border-bottom: 1px solid var(--border-subtle); }
  .ld-quote__inner { max-width: 920px; }
  .ld-quote blockquote { margin: 0; font-family: var(--font-serif); font-size: clamp(24px, 3vw, 38px); line-height: 1.28; letter-spacing: -0.018em; color: var(--text-heading); text-wrap: balance; }
  .ld-quote blockquote .mk { color: var(--copper-500); }
  .ld-quote__by { display: flex; align-items: center; gap: 14px; margin-top: 34px; }
  .ld-quote__avatar { width: 46px; height: 46px; border-radius: var(--radius-md); background: var(--forest-800); color: #EFF5F1; display: grid; place-items: center; font-family: var(--font-serif); font-weight: 600; }
  .ld-quote__who b { display: block; font-family: var(--font-sans); font-size: 15px; font-weight: 600; color: var(--text-heading); }
  .ld-quote__who span { font-size: 13.5px; color: var(--text-muted); }

  /* ============================== Final CTA ============================== */
  .ld-final { background: var(--forest-900); position: relative; overflow: hidden; isolation: isolate; }
  .ld-final::after { content: ""; position: absolute; inset: 0; z-index: -1; background: radial-gradient(75% 90% at 50% 120%, rgba(190,130,66,0.22), transparent 60%); }
  .ld-final__inner { text-align: center; padding-block: clamp(72px, 10vw, 128px); }
  .ld-final h2 { color: #F4F7F4; font-size: clamp(34px, 4.6vw, 60px); line-height: 1.05; letter-spacing: -0.026em; text-wrap: balance; }
  .ld-final p { font-size: clamp(16px, 1.5vw, 19px); color: rgba(231,239,233,0.78); margin-top: 20px; max-width: 520px; margin-inline: auto; }
  .ld-final__cta { display: flex; justify-content: center; gap: 14px; margin-top: 36px; flex-wrap: wrap; }
  .ld-final__note { font-family: var(--font-mono); font-size: 12.5px; color: rgba(231,239,233,0.5); margin-top: 26px; }

  /* ============================== Footer ============================== */
  .ld-foot { background: var(--forest-950); color: rgba(231,239,233,0.6); }
  .ld-foot__inner { padding-block: 40px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .ld-foot__brand { display: flex; align-items: center; gap: 10px; }
  .ld-foot__brand img { width: 24px; height: 24px; }
  .ld-foot__brand b { font-family: var(--font-serif); font-size: 17px; color: #EFF5F1; font-weight: 600; }
  .ld-foot__meta { margin-left: auto; font-family: var(--font-mono); font-size: 12.5px; }

  /* No opacity-hiding entrance: content is always visible (DS favors restraint). */
  .ld-rise { }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

    ReactDOM.createRoot(document.getElementById('app')).render(<window.WilfredLanding />);

</body>
</html>
