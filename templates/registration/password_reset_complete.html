{% extends "registration/_auth_base.html" %}

{% block auth_form %}
<h1 class="font-serif font-semibold text-[clamp(28px,3vw,36px)] leading-[1.1] tracking-[-0.02em] text-heading">Password reset complete</h1>
<p class="mt-3 text-[15px] leading-[1.6] text-body-subtle">You can now log in with your new password.</p>
<a class="mt-8 inline-flex items-center rounded-base bg-brand px-5 py-2.5 text-sm font-medium text-on-brand hover:bg-brand-strong focus:outline-none focus:ring-4 focus:ring-brand-medium transition-colors" href="{% url 'accounts:login' %}">Go to log in</a>
{% endblock auth_form %}
