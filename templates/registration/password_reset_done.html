{% extends "registration/_auth_base.html" %}

{% block auth_form %}
<h1 class="font-serif font-semibold text-[clamp(28px,3vw,36px)] leading-[1.1] tracking-[-0.02em] text-heading">Check your email</h1>
<p class="mt-3 text-[15px] leading-[1.6] text-body-subtle">If that address is registered, you'll receive a reset link shortly.</p>
<p class="mt-2 text-sm text-body-subtle">If you don't see the email, check your spam folder.</p>
<a class="mt-8 inline-flex items-center gap-1.5 text-sm font-medium text-fg-brand hover:text-heading transition-colors" href="{% url 'accounts:login' %}">Back to log in</a>
{% endblock auth_form %}
