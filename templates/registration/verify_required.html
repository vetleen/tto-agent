{% extends "_base.html" %}

{% block content %}
  <main class="mx-auto max-w-md px-6 py-16 text-body">
    <h1 class="text-3xl font-semibold tracking-tight text-heading">Verify your email</h1>
    <p class="mt-4 text-body">
      You need to verify your email address before you can log in. We sent a verification link to your email.
    </p>
    {% if email %}
      <p class="mt-2 text-sm text-body-subtle">
        Send another link to <strong>{{ email }}</strong>:
      </p>
      <form class="mt-4" method="post" action="{% url 'accounts:resend_verification' %}">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}">
        <button class="rounded-lg bg-brand px-5 py-2.5 text-sm font-medium text-on-brand hover:bg-brand-strong" type="submit">
          Resend verification email
        </button>
      </form>
    {% endif %}
    <p class="mt-6">
      <a class="text-sm font-medium text-fg-brand hover:text-fg-brand-strong" href="{% url 'accounts:login' %}">Back to log in</a>
    </p>
  </main>
{% endblock content %}
