{% extends "_base.html" %}

{% block content %}
  <main class="mx-auto max-w-md px-6 py-16 text-slate-900 dark:text-gray-100">
    <h1 class="text-2xl font-semibold text-slate-900 dark:text-white">Delete account</h1>
    <p class="mt-3 text-slate-600 dark:text-gray-300">
      This will permanently delete your account and all your data. This action cannot be undone.
    </p>
    {% if error %}
      <p class="mt-4 rounded-lg bg-red-50 dark:bg-red-900/30 px-4 py-3 text-sm text-red-700 dark:text-red-300">{{ error }}</p>
    {% endif %}
    <form class="mt-6 space-y-4" method="post">
      {% csrf_token %}
      <div>
        <label class="block text-sm font-medium text-slate-700 dark:text-gray-300" for="id_password">
          Confirm your password
        </label>
        <input class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-slate-900 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" id="id_password" name="password" type="password" required autocomplete="current-password">
      </div>
      <div class="flex items-center gap-3">
        <button class="rounded-lg bg-red-600 dark:bg-red-500 px-5 py-2.5 text-sm font-medium text-white hover:bg-red-500 dark:hover:bg-red-600" type="submit">
          Delete account
        </button>
        <a class="text-sm font-medium text-body hover:text-heading dark:text-gray-300 dark:hover:text-white" href="{% url 'index' %}">
          Cancel
        </a>
      </div>
    </form>
  </main>
{% endblock content %}
