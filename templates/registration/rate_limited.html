{% extends "_base.html" %}

{% block content %}
  <main class="mx-auto max-w-md px-6 py-16 text-body">
    <h1 class="text-3xl font-semibold tracking-tight text-heading">Let's slow down for a moment</h1>
    <p class="mt-4 text-sm text-body">
      There have been a few too many login attempts. Wait a few minutes, then try again.
    </p>
    <a class="mt-6 inline-flex items-center text-sm font-medium text-fg-brand hover:text-fg-brand-strong" href="{% url 'accounts:login' %}">
      Back to log in
    </a>
  </main>
{% endblock content %}
