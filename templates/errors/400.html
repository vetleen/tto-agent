{% extends "_base.html" %}

{% block content %}
<main class="mx-auto max-w-4xl px-6 py-24 text-center">
  <p class="text-6xl font-bold text-indigo-600 dark:text-indigo-400">400</p>
  <h1 class="mt-4 text-3xl font-semibold tracking-tight text-heading">Bad request</h1>
  <p class="mt-4 text-body">The request could not be processed. If you were uploading files, you may have selected too many at once (maximum 100 per upload).</p>
  <div class="mt-8 flex items-center justify-center gap-4">
    <a href="/" class="rounded-lg bg-indigo-600 dark:bg-indigo-500 px-5 py-2.5 text-sm font-medium text-white hover:bg-indigo-500 dark:hover:bg-indigo-400">
      Go home
    </a>
    <a href="javascript:history.back()" class="text-sm font-medium text-indigo-600 dark:text-indigo-400 hover:text-indigo-500">
      Go back
    </a>
  </div>
</main>
{% endblock content %}
