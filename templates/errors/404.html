{% extends "_base.html" %}

{% block content %}
<main class="mx-auto max-w-4xl px-6 py-24 text-center">
  <p class="text-6xl font-bold text-fg-brand">404</p>
  <h1 class="mt-4 text-3xl font-semibold tracking-tight text-heading">Page not found</h1>
  <p class="mt-4 text-body">We couldn't find that page. It may have been moved or deleted.</p>
  <div class="mt-8 flex items-center justify-center gap-4">
    <a href="/" class="rounded-lg bg-brand px-5 py-2.5 text-sm font-medium text-on-brand hover:bg-brand-strong">
      Go home
    </a>
    <a href="javascript:history.back()" class="text-sm font-medium text-fg-brand hover:text-fg-brand-strong">
      Go back
    </a>
  </div>
</main>
{% endblock content %}
