<header class="sticky top-16 z-10 bg-neutral-primary border-b border-default">
  <nav class="bg-neutral-secondary-soft border-y border-default" aria-label="Breadcrumb">
    <div class="max-w-screen-xl px-4 py-2.5 mx-auto">
      <ol class="flex items-center gap-2 text-sm text-body min-w-0">
        <li class="shrink-0">
          <a href="{% url 'meeting_list' %}" class="inline-flex items-center gap-1.5 hover:text-heading">
            <svg class="w-4 h-4 shrink-0 text-body-subtle" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            <span>Meetings</span>
          </a>
        </li>
        <li class="shrink-0" aria-hidden="true">
          <svg class="w-3.5 h-3.5 text-body-subtle" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
        </li>
        <li class="min-w-0">
          <span class="font-medium text-heading truncate block" title="{{ meeting.name }}">{{ meeting.name }}</span>
        </li>
      </ol>
    </div>
  </nav>
</header>
